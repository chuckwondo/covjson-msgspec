# ProperDocs configuration (see ADR-0014 for the toolchain decision).
# ProperDocs is a fork of MkDocs 1.x, so this is MkDocs-1.x-schema YAML: a
# future migration to Zensical or MkDocs is a rename plus a dependency swap.
# Build with: uv run --group docs properdocs build   (serve: ... properdocs serve)
site_name: covjson-msgspec
site_description: Fast, fully-typed CoverageJSON models built on msgspec
repo_url: https://github.com/chuckwondo/covjson-msgspec
repo_name: chuckwondo/covjson-msgspec

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow
  # Rung-1 customization (see ADR-0014 "Theme and customization"): named-palette
  # brand colors, a one-word swap. Exact hex values are the rung-2 seam below.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Rung-2 seam: override Material's CSS custom properties here, not its templates,
# so the look stays portable across theme upgrades and a future Zensical
# migration. The real visual design is #21; this is just the wired seam.
extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          # Static (griffe) extraction: griffe parses src/ and never imports the
          # package, so TYPE_CHECKING-only bridge annotations render faithfully
          # without numpy/xarray/pandas installed at build time.
          paths: [src]
          # Load dependency inventories so bridge signatures cross-link into the
          # upstream docs (the intersphinx equivalent); mkdocstrings also emits
          # our own objects.inv for downstream projects to link into.
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://docs.xarray.dev/en/stable/objects.inv
            - https://pandas.pydata.org/docs/objects.inv
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Core concepts: concepts.md
  - Guides:
      - Bridges:
          - xarray: guides/xarray.md
          - pandas: guides/pandas.md
          - geo / GeoJSON: guides/geo.md
          - numpy: guides/numpy.md
      - Validation: guides/validation.md
      - Subsetting: guides/subsetting.md
      - Serving over HTTP: guides/http.md
      - Resolving references: guides/references.md
      - Assembling tiles: guides/tiles.md
      - Advanced patterns: guides/advanced.md
  - API reference:
      - Overview: reference/index.md
      - Coverage & collections: reference/coverage.md
      - Domain & axes: reference/domain.md
      - Ranges: reference/range.md
      - Referencing systems: reference/referencing.md
      - Parameters & i18n: reference/parameter.md
      - Validation: reference/validation.md
      - Subsetting: reference/subset.md
      - Reference resolution & fetching: reference/references.md
      - Temporal: reference/temporal.md
      - HTTP, media type & schema: reference/media-type.md
      - Bridges: reference/bridges.md
  - Design decisions:
      - Overview: design/index.md
      - Design tenets: design/tenets.md
      - Architecture decision records:
          - About the ADRs: adr/README.md
          - "ADR-0001: Python 3.11 floor": adr/0001-python-3-11-floor.md
          - "ADR-0002: Opt-in tiered validation": adr/0002-opt-in-tiered-validation.md
          - "ADR-0003: IssueCode enum": adr/0003-issue-code-enum.md
          - "ADR-0004: Single non-generic NdArray": adr/0004-ndarray-single-non-generic-class.md
          - "ADR-0005: langcodes core dependency": adr/0005-langcodes-core-dependency.md
          - "ADR-0006: Validation findings sum type": adr/0006-validation-findings-sum-type.md
          - "ADR-0007: Functional-core best-effort fetching": adr/0007-functional-core-errors-as-values.md
          - "ADR-0008: Temporal result projection": adr/0008-temporal-conversion-result-projection.md
          - "ADR-0009: OpenAPI schema bridge": adr/0009-openapi-schema-bridge.md
          - "ADR-0010: Dependency floor policy": adr/0010-dependency-floor-policy.md
          - "ADR-0011: Axis-ordering checker seam": adr/0011-axis-ordering-checker-seam.md
          - "ADR-0012: Foreign members dropped on decode": adr/0012-foreign-members-dropped-on-decode.md
          - "ADR-0013: UNSET for inheritance members": adr/0013-unset-for-omittable-inheritance-members.md
          - "ADR-0014: Documentation toolchain": adr/0014-documentation-toolchain.md
