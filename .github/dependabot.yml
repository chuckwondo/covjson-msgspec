# Dependabot: opens grouped PRs to update GitHub Actions pins and dependencies
# on a schedule. A cooldown holds back brand-new releases (see note below).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Wait this many days after a release before opening an update PR, so a
    # freshly published (possibly compromised or soon-yanked) version is not
    # adopted immediately. Only `default-days` applies here: the
    # `semver-*-days` keys are not supported for the github-actions ecosystem.
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /
    # This is a library: the dependency lower bounds in pyproject.toml are a
    # compatibility contract, not an application's pins. `lockfile-only` lets
    # Dependabot refresh uv.lock (dev/CI) without ever rewriting those floors, so a
    # runtime floor rises only by a deliberate decision (see #65). Supported for
    # the uv ecosystem per dependabot-core#12162.
    versioning-strategy: lockfile-only
    schedule:
      interval: weekly
    # See the cooldown note above; only `default-days` applies to the uv
    # ecosystem as well.
    cooldown:
      default-days: 7
    groups:
      dev-dependencies:
        dependency-type: development
