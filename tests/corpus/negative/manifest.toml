# `axis.composite-value-shape` gets a case per dataType: one code, but two
# predicates (an element that is not an array, versus one that is not a GeoJSON
# Polygon coordinate array), and a single document would leave the other green
# but unexercised.
[[case]]
file = "axis-composite-value-shape-tuple.json"
issues = [{ code = "axis.composite-value-shape", severity = "error" }]

[[case]]
file = "axis-composite-value-shape-polygon.json"
issues = [{ code = "axis.composite-value-shape", severity = "error" }]

