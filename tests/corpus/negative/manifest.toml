# Hand-authored negative corpus (authored by this project; no upstream license).
# Each document is minimal and decodes cleanly, but targets one validate() issue
# code that the vendored upstream corpora do not exercise. The harness
# (tests/test_corpus.py) asserts that validate(check_values=True) reports exactly
# the listed (code, severity) issues. Together with the covjson-pydantic
# validate_reject fixtures these cover every code validation.py emits, which
# test_every_issue_code_has_corpus_coverage enforces rather than trusting.

[[case]]
file = "ndarray-value-count.json"
issues = [{ code = "ndarray.value-count", severity = "error" }]

[[case]]
file = "range-axis-not-in-domain.json"
issues = [{ code = "coverage.range-axis-not-in-domain", severity = "error" }]

